bindlu = , switch:on:Lid Switch, exec, lockscreen
bindlu = , switch:on:Lid Switch, exec, systemctl suspend

# top row
bindleu = , XF86AudioRaiseVolume, exec, set-volume up
bindleu = , XF86AudioLowerVolume, exec, set-volume down
bindleu = , XF86AudioMute, exec, set-volume mute

bindleu = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindleu = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindleu = , XF86KbdBrightnessUp, exec, brightnessctl --device='chromeos::kbd_backlight' set 10%+
bindleu = , XF86KbdBrightnessDown, exec, brightnessctl --device='chromeos::kbd_backlight' set 10%-

bindlu = , XF86AudioPlayPause, exec, playerctl play-pause
bindlu = , XF86AudioNext, exec, playerctl next
bindlu = , XF86AudioPrev, exec, playerctl previous

bindu = , XF86FullScreen, fullscreen, 0
bindu = , XF86Print, fullscreen, 0

bindlu = , Print, exec, shot region
bindlu = CTRL, Print, exec, shot window
bindlu = CTRL SHIFT, Print, exec, shot screen

bindu = SUPER ALT, g, exec, hyprshade toggle grayscale

# bind = SUPER, space, exec, kb-switcher timed
bindu = , iso_next_group, exec, kb-switcher timed
